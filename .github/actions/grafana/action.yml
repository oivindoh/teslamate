name: "Grafana"
description: "Grafana images"
inputs:
  tags:
    description: "Tags"
    required: false
    default: ""
  labels:
    description: "Labels"
    required: true
  image:
    description: "Image target"
    required: true
    default: "docker.io/teslamate/grafana"
runs:
  using: "composite"
  steps:
    - name: Docker meta
      id: docker_meta
      uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
      with:
        images: ${{ inputs.image }}
        tags: ${{ inputs.tags }}
        labels: ${{ inputs.labels }}
    - name: Set up QEMU
      uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
    - name: Build and push
      id: build
      uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
      with:
        context: grafana
        push: true
        platforms: linux/amd64,linux/arm/v7,linux/arm64
        tags: ${{ steps.docker_meta.outputs.tags }}
        # See build action for why BuildKit-side attestations are disabled:
        # we want outputs.digest to be the multi-arch manifest list digest so
        # that signed attestations land where `gh attestation verify` looks.
        provenance: false
        sbom: false
        cache-from: type=gha
        cache-to: type=gha,mode=max
    - name: Generate SBOM for grafana image
      uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
      with:
        image: ${{ inputs.image }}@${{ steps.build.outputs.digest }}
        format: spdx-json
        output-file: /tmp/grafana-sbom.spdx.json
        upload-artifact: false
        upload-release-assets: false
    - name: Attest grafana provenance
      uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
      with:
        subject-name: ${{ inputs.image }}
        subject-digest: ${{ steps.build.outputs.digest }}
        push-to-registry: true
    - name: Attest grafana SBOM
      uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
      with:
        subject-name: ${{ inputs.image }}
        subject-digest: ${{ steps.build.outputs.digest }}
        predicate-type: 'https://spdx.dev/Document'
        predicate-path: /tmp/grafana-sbom.spdx.json
        push-to-registry: true
