name: Publish Docker images

on:
  workflow_dispatch:
  workflow_call:
  schedule:
    - cron: "0 3 * * *"
  push:
    tags:
      - "v*"
    paths:
      - "**/*"
      - "!.github/**" # Important: Exclude PRs related to .github from auto-run
      - "!.github/workflows/**" # Important: Exclude PRs related to .github/workflows from auto-run
      - "!.github/actions/**" # Important: Exclude PRs related to .github/actions from auto-run
env:
  # Fully qualified: `actions/attest-build-provenance` looks up registry
  # credentials by the first slash-separated component of subject-name. The
  # bare `teslamate/teslamate` form makes it search for credentials under a
  # registry named "teslamate" and fail; "docker.io/teslamate/teslamate" is
  # unambiguous and resolves to the existing Docker Hub login.
  REGISTRY_IMAGE: docker.io/teslamate/teslamate

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

jobs:
  check_paths:
    uses: ./.github/workflows/check_paths.yml

  teslamate_build:
    needs: check_paths
    if: needs.check_paths.outputs.githubfolder == 'false' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "linux/amd64"
            runs_on: "ubuntu-24.04"
            cache_id: amd64
          - platform: "linux/arm/v7"
            runs_on: "ubuntu-24.04-arm"
            cache_id: arm
          - platform: "linux/arm64"
            runs_on: "ubuntu-24.04-arm"
            cache_id: arm64

    runs-on: ${{ matrix.runs_on }}
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Buildx
        uses: ./.github/actions/build
        with:
          is_dockerhub_pushed: "1"
          docker_password: ${{ secrets.DOCKER_PASSWORD }}
          repository_owner: ${{ github.repository_owner }}
          repository: ${{ github.repository }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          version: ${{ github.head_ref || github.ref_name }}

  teslamate_merge:
    runs-on: ubuntu-24.04
    needs:
      - check_paths
      - teslamate_build
    if: needs.check_paths.outputs.githubfolder == 'false' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Login to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: teslamate
          password: ${{ secrets.DOCKER_PASSWORD }}

      - uses: ./.github/actions/merge
        with:
          image: ${{ env.REGISTRY_IMAGE }}
          tags: |
            type=schedule,pattern=edge
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=edge
            type=raw,value=dispatch-${{ github.ref_name }},enable=${{ github.event_name == 'workflow_dispatch' }}
  grafana:
    needs: check_paths
    if: needs.check_paths.outputs.githubfolder == 'false' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Login to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: teslamate
          password: ${{ secrets.DOCKER_PASSWORD }}

      - uses: ./.github/actions/grafana
        with:
          tags: |
            type=edge
            type=schedule,pattern=edge
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=dispatch-${{ github.ref_name }},enable=${{ github.event_name == 'workflow_dispatch' }}
